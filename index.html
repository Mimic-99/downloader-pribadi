<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One Video Downloader</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        input { width: 90%; padding: 12px; margin: 10px 0; border: none; border-radius: 5px; box-sizing: border-box; }
        button { width: 90%; padding: 12px; background-color: #ff9800; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #e68a00; }
        .result { margin-top: 20px; display: none; text-align: left; }
        .result a { display: block; background: #25d366; color: white; text-align: center; padding: 12px; margin: 8px 0; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Multi-Platform Downloader v3</h2>
    <p>Unduh Video & Audio Tanpa Batasan Server</p>
    
    <input type="text" id="videoUrl" placeholder="Tempel link video di sini...">
    <button onclick="processVideo()">Buka Jalur Unduhan</button>

    <div class="result" id="resultBox">
        <h3 style="border-bottom: 1px solid #333; padding-bottom: 5px;">Klik Tombol di Bawah:</h3>
        <div id="downloadLinks"></div>
    </div>
</div>

<script>
function processVideo() {
    const url = document.getElementById('videoUrl').value;
    const resultBox = document.getElementById('resultBox');
    const downloadLinks = document.getElementById('downloadLinks');

    if (!url) { alert('Silakan tempel link terlebih dahulu!'); return; }

    resultBox.style.display = 'block';
    downloadLinks.innerHTML = '';

    // Menggunakan metode pengarah otomatis ke server publik yang selalu dirawat
    const savefromUrl = `https://id.savefrom.net/#url=${encodeURIComponent(url)}`;
    downloadLinks.innerHTML += `<a href="${savefromUrl}" target="_blank">PROSES & UNDUH VIDEO</a>`;
    
    const backupUrl = `https://9jarocks.com.ng/download/v2/index.php?url=${encodeURIComponent(url)}`;
    downloadLinks.innerHTML += `<a href="${backupUrl}" target="_blank" style="background:#34b7f1;">JALUR CADANGAN (VIDEO/MP3)</a>`;
}
</script>

</body>
</html>
